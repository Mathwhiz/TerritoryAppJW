  <meta charset="UTF-8">

  <title>Congregación Sur</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #1e1e1e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 320px;
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .logo-title {
      font-size: 32px;
      font-weight: 500;
      color: #eee;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 14px;
      color: #888;
    }
    .nav-card {
      width: 100%;
      background: #2a2a2a;
      border: 1.5px solid #444;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
    }
    .nav-card:hover { transform: scale(1.02); }
    .nav-card:active { transform: scale(0.98); }
    .nav-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-title { font-size: 17px; font-weight: 500; color: #eee; margin-bottom: 3px; }
    .nav-sub   { font-size: 13px; color: #888; }

    .card-terr  { border-color: #97C459; }
    .card-terr  .nav-icon { background: rgba(151,196,89,0.15); }
    .card-terr:hover { background: rgba(151,196,89,0.07); }

    .card-asign { border-color: #7F77DD; }
    .card-asign .nav-icon { background: rgba(127,119,221,0.15); }
    .card-asign:hover { background: rgba(127,119,221,0.07); }

    .footer { font-size: 12px; color: #555; margin-top: 8px; }
  </style>
</head>

        </svg>
      </div>
      <div>

        <div class="nav-sub">Planificar y registrar salidas</div>
      </div>

      <div class="nav-icon">

      </div>

        <div class="nav-sub">Acomodadores, sonido y más</div>
      </div>
