<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador de Salidas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; padding: 1rem; background: #1e1e1e; color: #eee; min-height: 100vh; }

/* Barra de pasos */
.step-bar { display: flex; gap: 6px; margin-bottom: 20px; }
.step { flex: 1; height: 3px; border-radius: 2px; background: #444; }
.step.active { background: #185FA5; }
.step.done { background: #1D9E75; }

/* Encabezados de sección */
.section-title { font-size: 22px; font-weight: 500; color: #eee; margin-bottom: 4px; text-align: center; }
.section-sub { font-size: 13px; color: #888; margin-bottom: 16px; text-align: center; }

/* Grid territorios */
.terr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 14px; }
.terr-btn { background: #2a2a2a; border: 0.5px solid #444; border-radius: 10px; padding: 12px 8px; cursor: pointer; text-align: center; }
.terr-btn:hover { border-color: #666; }
.terr-btn.selected { border: 1.5px solid #378ADD; background: #0c2a45; }
.terr-num { font-size: 24px; font-weight: 500; color: #eee; }
.terr-btn.selected .terr-num { color: #85B7EB; }
.terr-date { font-size: 11px; color: #888; margin-top: 4px; }
.terr-days { font-size: 13px; font-weight: 500; margin-top: 4px; }
.days-old { color: #F09595; }
.days-mid { color: #FAC775; }
.days-new { color: #C0DD97; }

/* Footer paso 1 */
.step1-footer { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
.step1-footer span { font-size: 13px; color: #888; }

/* Cards de configuración */
.salida-card { background: #2a2a2a; border: 0.5px solid #444; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.salida-card.tel-card { border-left: 3px solid #1D9E75; background: #0d2420; }
.salida-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.salida-label { font-size: 14px; font-weight: 500; color: #eee; }
.phone-badge { font-size: 12px; background: #0a2e24; color: #5DCAA5; padding: 2px 8px; border-radius: 20px; border: 0.5px solid #1D9E75; }
.dia-label { font-size: 18px; font-weight: 500; }
.dia-martes { color: #85B7EB; }
.dia-jueves { color: #FAC775; }
.dia-viernes { color: #C0DD97; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
select, input[type=text], input[type=date], input[type=time] { width: 100%; font-size: 13px; padding: 6px 8px; border: 0.5px solid #555; border-radius: 8px; background: #1e1e1e; color: #eee; }
select option { background: #2a2a2a; color: #eee; }
label { font-size: 12px; color: #888; display: block; margin-bottom: 3px; }

/* Botones */
.btn-primary { padding: 9px 16px; font-size: 13px; font-weight: 500; background: #185FA5; color: white; border: none; border-radius: 8px; cursor: pointer; }
.btn-primary:hover { background: #0C447C; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-secondary { padding: 9px 16px; font-size: 13px; border: 0.5px solid #555; border-radius: 8px; background: #2a2a2a; color: #ccc; cursor: pointer; }
.btn-secondary:hover { background: #333; }
.btn-autofill { font-size: 12px; padding: 5px 12px; background: #1a2e0a; color: #97C459; border: 0.5px solid #3B6D11; border-radius: 8px; cursor: pointer; }
.btn-clear { font-size: 12px; padding: 5px 12px; background: #2e1a1a; color: #F09595; border: 0.5px solid #A32D2D; border-radius: 8px; cursor: pointer; }

/* ── Carátula ── */
.cover { min-height: calc(100vh - 2rem); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 1.5rem; text-align: center; }
.cover-icon { width: 72px; height: 72px; background: rgba(59,109,17,0.25); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
.cover-title { font-size: 52px; font-weight: 500; color: #97C459; line-height: 1.1; margin-bottom: 8px; }
.cover-subtitle { font-size: 18px; color: #639922; letter-spacing: 0.04em; margin-bottom: 48px; }
.grupo-label { font-size: 20px; font-weight: 500; color: #ccc; margin-bottom: 16px; }
.grupo-grid { display: flex; gap: 12px; margin-bottom: 36px; }
.grupo-btn { width: 72px; height: 72px; border-radius: 14px; border: 0.5px solid #444; background: #2a2a2a; font-size: 26px; font-weight: 500; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.grupo-btn:hover { border-color: #97C459; background: rgba(59,109,17,0.2); color: #97C459; }
.grupo-btn.selected { border: 2px solid #97C459; background: rgba(59,109,17,0.25); color: #C0DD97; }
.btn-start { padding: 14px 48px; font-size: 16px; font-weight: 500; background: #3B6D11; color: #fff; border: none; border-radius: 12px; cursor: pointer; opacity: 0.3; pointer-events: none; letter-spacing: 0.02em; }
.btn-start.enabled { opacity: 1; pointer-events: auto; }
.btn-start.enabled:hover { background: #27500A; }

/* ── Tabla final ── */
.card-preview { background: #2a2a2a; border: 0.5px solid #444; border-radius: 16px; overflow: hidden; }
.card-preview-header { padding: 14px 18px 12px; border-bottom: 0.5px solid #444; }
.card-preview-top { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 2px; }
.card-preview-main { font-size: 17px; font-weight: 500; color: #eee; }
table.preview { width: 100%; border-collapse: collapse; }
table.preview th { background: #111; color: #fff; padding: 10px 10px; text-align: center; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; border-right: 0.5px solid rgba(255,255,255,0.08); }
table.preview th:last-child { border-right: none; }
table.preview td { padding: 10px 10px; text-align: center; border-bottom: 0.5px solid #3a3a3a; color: #eee; background: #2a2a2a; vertical-align: middle; }
table.preview tr:last-child td { border-bottom: none; }
table.preview tr:nth-child(odd) td { background: #242424; }
table.preview tr.tel-row td { background: #0d2420; }
table.preview tr.tel-row td:first-child { border-left: 3px solid #1D9E75; }
.tel-terr { font-size: 11px; font-weight: 500; color: #5DCAA5; letter-spacing: 0.05em; text-transform: uppercase; }
.dia-badge { display: inline-block; font-size: 14px; font-weight: 500; padding: 4px 12px; border-radius: 20px; margin-bottom: 3px; }
.badge-mar { background: #0c2a45; color: #85B7EB; }
.badge-jue { background: #2e1e00; color: #FAC775; }
.badge-vie { background: #1a2e0a; color: #C0DD97; }
.terr-num-big { font-size: 18px; font-weight: 500; color: #eee; }
.fecha-num { font-size: 13px; color: #aaa; margin-top: 2px; }
.cond-txt { font-size: 13px; color: #999; }
.hora-txt { font-size: 15px; font-weight: 500; color: #eee; }
</style>
</head>
<body>
<div class="app">

<div class="step-bar" id="step-bar" style="display:none;">
  <div class="step" id="s1"></div>
  <div class="step" id="s2"></div>
  <div class="step" id="s3"></div>
</div>

<!-- PASO 0: Carátula -->
<div id="view-cover">
  <div class="cover">
    <div class="cover-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <path d="M9 20H5a2 2 0 01-2-2V6a2 2 0 012-2h4M15 4h4a2 2 0 012 2v12a2 2 0 01-2 2h-4M9 12h6M12 9v6" stroke="#97C459" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="cover-title">Planificador<br>de Salidas</div>
    <div class="cover-subtitle">Congregación Sur</div>
    <div class="grupo-label">¿Con qué grupo trabajás?</div>
    <div class="grupo-grid">
      <button class="grupo-btn" onclick="selectGrupo(this,1)">1</button>
      <button class="grupo-btn" onclick="selectGrupo(this,2)">2</button>
      <button class="grupo-btn" onclick="selectGrupo(this,3)">3</button>
      <button class="grupo-btn" onclick="selectGrupo(this,4)">4</button>
    </div>
    <button class="btn-start" id="btn-start" onclick="goToStep1()">Empezar →</button>
  </div>
</div>

<!-- PASO 1: Elegir territorios -->
<div id="view-select" style="display:none;">
  <p class="section-title">Elegí 3 territorios</p>
  <p class="section-sub" id="week-info"></p>
  <div class="terr-grid" id="terr-grid"></div>
  <div class="step1-footer">
    <span id="sel-count">0 de 3 seleccionados</span>
    <button class="btn-secondary" onclick="goToCover()">← Grupo</button>
    <button class="btn-primary" id="btn-next1" onclick="goToStep2()" disabled>Continuar →</button>
  </div>
</div>

<!-- PASO 2: Configurar salidas -->
<div id="view-config" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <p class="section-title" style="margin:0;text-align:left;">Configurá cada salida</p>
    <div style="display:flex;gap:6px;">
      <button class="btn-clear" onclick="clearAll()">Limpiar</button>
      <button class="btn-autofill" onclick="autoFillAll()">Autocompletar</button>
    </div>
  </div>
  <div id="salidas-container"></div>
  <div style="display:flex;gap:8px;margin-top:4px;">
    <button class="btn-secondary" onclick="goToStep1()" style="flex:1;">← Volver</button>
    <button class="btn-primary" onclick="generatePreview()" style="flex:2;">Generar tabla →</button>
  </div>
</div>

<!-- PASO 3: Vista previa -->
<div id="view-preview" style="display:none;">
  <p class="section-title" style="margin-bottom:12px;">Vista previa</p>
  <div class="card-preview">
    <div class="card-preview-header">
      <div class="card-preview-top">Congregación Sur</div>
      <div class="card-preview-main" id="preview-grupo-title">Grupo — Salidas de la semana</div>
    </div>
    <table class="preview">
      <thead><tr><th>ENCUENTRO</th><th>Nº TERRITORIO</th><th>FECHA</th><th>CONDUCTOR</th><th>HORA</th></tr></thead>
      <tbody id="preview-body"></tbody>
    </table>
  </div>
  <div style="margin-top:12px;">
    <button class="btn-secondary" onclick="goToStep2()" style="width:100%;">← Editar</button>
  </div>
</div>

<script>
const CONDUCTORES = ['Andrés Sánchez','Eduardo Scalese','Jose Luis Lasierra','Diego Reinoso','Armando Núñez'];
const TERRITORIES = [
  {n:'1',last:'2026-02-06'},{n:'2',last:'2026-02-14'},{n:'3',last:'2026-02-14'},
  {n:'4',last:'2026-02-14'},{n:'5',last:'2026-02-14'},{n:'6',last:'2026-03-10'},
  {n:'7',last:'2026-02-03'},{n:'8',last:'2026-02-24'},{n:'9',last:'2026-03-10'},
  {n:'10',last:'2026-02-08'},{n:'11',last:'2025-08-23',special:true},{n:'12',last:'2026-03-12'},
  {n:'15',last:'2026-03-13'},{n:'16',last:'2026-01-09'},{n:'17',last:'2026-01-07'},
  {n:'18',last:'2026-01-11'},{n:'19',last:'2026-03-06'},{n:'20',last:'2026-01-20'},
  {n:'21',last:'2026-02-17'},{n:'22',last:'2026-02-26'},{n:'23',last:'2026-01-29'},
  {n:'24',last:'2026-02-27'},{n:'25',last:'2026-02-20'},{n:'129',last:'2026-03-05'},
  {n:'141',last:'2026-03-11'},{n:'146',last:'2026-03-11'},{n:'147',last:'2026-02-12'},
  {n:'149',last:'2026-01-26'},{n:'150',last:'2026-02-10'},{n:'153',last:'2026-01-28'},
  {n:'154',last:'2026-01-20'},{n:'167',last:'2026-02-24'},{n:'168',last:'2025-12-09'},
  {n:'169',last:'2026-02-17'}
];
const TERRITORIES_BY_GROUP = { 3: TERRITORIES };
const DIA_CONFIG = [
  { key:'tue', label:'Martes', cls:'dia-martes' },
  { key:'thu', label:'Jueves', cls:'dia-jueves' },
  { key:'fri', label:'Viernes', cls:'dia-viernes' }
];
const DIA_ORDER = { tue:0, thu:1, fri:2 };
const DIA_DEFAULT_HORA = { tue:'17:30', thu:'18:30', fri:'18:30' };

let selectedGrupo = null;
let selected = [];

function selectGrupo(el, n) {
  document.querySelectorAll('.grupo-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedGrupo = n;
  document.getElementById('btn-start').classList.add('enabled');
}

function getWeekDates() {
  const now = new Date(); const day = now.getDay();
  const monday = new Date(now); monday.setDate(now.getDate()-(day===0?6:day-1));
  function d(o){const x=new Date(monday);x.setDate(monday.getDate()+o);return x.toISOString().slice(0,10);}
  return {mon:d(0),tue:d(1),thu:d(3),fri:d(4),sun:d(6)};
}
function formatShort(ds){if(!ds)return'—';const d=new Date(ds+'T00:00:00');return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;}
function formatShortFull(ds){if(!ds)return'—';const d=new Date(ds+'T00:00:00');return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;}
function daysSince(ds){return Math.floor((new Date()-new Date(ds+'T00:00:00'))/86400000);}
function dayClass(d){return d>90?'days-old':d>45?'days-mid':'days-new';}

const WEEK = getWeekDates();

function renderGrid() {
  const territorios = TERRITORIES_BY_GROUP[selectedGrupo] || [];
  const sorted = territorios.map(t=>({...t,days:daysSince(t.last)})).sort((a,b)=>b.days-a.days);
  const g = document.getElementById('terr-grid'); g.innerHTML='';
  if(territorios.length === 0){
    g.innerHTML='<p style="color:#888;font-size:13px;grid-column:1/-1;text-align:center;">No hay territorios cargados para este grupo todavía.</p>';
    document.getElementById('sel-count').textContent='0 de 3 seleccionados';
    document.getElementById('btn-next1').disabled=true;
    return;
  }
  sorted.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='terr-btn'+(selected.includes(t.n)?' selected':'');
    btn.innerHTML=`<div class="terr-num">${t.n}${t.special?' ⚠':''}</div><div class="terr-date">Últ: ${formatShortFull(t.last)}</div><div class="terr-days ${dayClass(t.days)}">${t.days}d</div>`;
    btn.onclick=()=>{if(selected.includes(t.n))selected=selected.filter(x=>x!==t.n);else if(selected.length<3)selected.push(t.n);renderGrid();};
    g.appendChild(btn);
  });
  document.getElementById('sel-count').textContent=`${selected.length} de 3 seleccionados`;
  document.getElementById('btn-next1').disabled=selected.length!==3;
}

function setStep(n){
  document.getElementById('step-bar').style.display='flex';
  for(let i=1;i<=3;i++) document.getElementById('s'+i).className='step'+(i<n?' done':i===n?' active':'');
}
function show(id){document.getElementById(id).style.display='';}
function hide(id){document.getElementById(id).style.display='none';}

function goToCover(){
  selected=[];
  hide('view-select');hide('view-config');hide('view-preview');
  show('view-cover');
  document.getElementById('step-bar').style.display='none';
}
function goToStep1(){
  hide('view-cover');hide('view-config');hide('view-preview');
  show('view-select'); setStep(1);
  document.getElementById('week-info').textContent=`Semana del ${formatShort(WEEK.mon)} al ${formatShort(WEEK.sun)}`;
  renderGrid();
}

function condSelect(id){
  return`<select id="${id}"><option value="">— Elegir —</option>${CONDUCTORES.map(c=>`<option>${c}</option>`).join('')}</select>`;
}

function reorderPhone(){
  const diaKey = document.getElementById('dia-phone')?.value || 'tue';
  const c = document.getElementById('salidas-container');
  const phoneCard = document.getElementById('card-phone');
  if(!phoneCard) return;
  phoneCard.dataset.diaKey = diaKey;
  phoneCard.dataset.fecha = WEEK[diaKey];

  // Actualizar hora default según el día elegido
  const horaInput = document.getElementById('hora-phone');
  if(horaInput && !horaInput.dataset.edited) horaInput.value = DIA_DEFAULT_HORA[diaKey];

  const phoneOrder = DIA_ORDER[diaKey] ?? 0;
  const terrCards = selected.map((n,i)=>document.getElementById('card-terr-'+i)).filter(Boolean);
  let inserted = false;
  for(let i=0;i<terrCards.length;i++){
    if(phoneOrder <= i && !inserted){
      c.insertBefore(phoneCard, terrCards[i]);
      inserted = true;
      break;
    }
  }
  if(!inserted) c.appendChild(phoneCard);
}

function renderSalidas(){
  const c=document.getElementById('salidas-container');c.innerHTML='';
  selected.forEach((n,i)=>{
    const cfg=DIA_CONFIG[i]; const fechaVal=WEEK[cfg.key];
    const div=document.createElement('div');
    div.className='salida-card';
    div.id='card-terr-'+i;
    div.dataset.idx=i;
    div.innerHTML=`
      <div class="salida-header">
        <span class="salida-label">Territorio ${n}</span>
        <span class="dia-label ${cfg.cls}">${cfg.label}</span>
      </div>
      <div class="form-row">
        <div><label>Conductor</label>${condSelect('cond-'+n)}</div>
        <div><label>Día</label><input type="date" id="fecha-${n}" value="${fechaVal}"></div>
      </div>
      <div class="form-row">
        <div><label>Hora</label><input type="time" id="hora-${n}" value="18:30"></div>
        <div><label>Encuentro / Familia</label><input type="text" id="enc-${n}" placeholder="Ej: Flia. García"></div>
      </div>`;
    c.appendChild(div);
  });

  const phoneDiv=document.createElement('div');
  phoneDiv.className='salida-card tel-card';
  phoneDiv.id='card-phone';
  phoneDiv.dataset.diaKey='tue';
  phoneDiv.dataset.fecha=WEEK.tue;
  phoneDiv.innerHTML=`
    <div class="salida-header">
      <span class="salida-label">Salida telefónica</span>
      <span class="phone-badge">Telefónica</span>
    </div>
    <div class="form-row">
      <div><label>Conductor</label>${condSelect('cond-phone')}</div>
      <div><label>Día</label>
        <select id="dia-phone" onchange="reorderPhone()">
          <option value="tue">Martes</option>
          <option value="thu">Jueves</option>
          <option value="fri">Viernes</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><label>Hora</label><input type="time" id="hora-phone" value="17:30" oninput="this.dataset.edited='1'"></div>
      <div><label>Encuentro / Familia</label><input type="text" id="enc-phone" placeholder="Ej: Flia. López"></div>
    </div>`;
  c.appendChild(phoneDiv);
  reorderPhone();
}

function goToStep2(){
  if(selected.length!==3)return;
  hide('view-select');show('view-config');hide('view-preview');setStep(2);renderSalidas();
}

function autoFillAll(){
  selected.forEach((n,i)=>{
    const fd=document.getElementById('fecha-'+n);
    const fh=document.getElementById('hora-'+n);
    if(fd)fd.value=WEEK[DIA_CONFIG[i].key];
    if(fh)fh.value='18:30';
  });
  const hp=document.getElementById('hora-phone');
  const dp=document.getElementById('dia-phone');
  if(hp){ delete hp.dataset.edited; hp.value=DIA_DEFAULT_HORA[dp?.value||'tue']; }
}

function clearAll(){
  selected.forEach(n=>{
    const fc=document.getElementById('cond-'+n);
    const fh=document.getElementById('hora-'+n);
    const fe=document.getElementById('enc-'+n);
    if(fc)fc.value='';
    if(fh)fh.value='';
    if(fe)fe.value='';
  });
  const cp=document.getElementById('cond-phone');
  const hp=document.getElementById('hora-phone');
  const ep=document.getElementById('enc-phone');
  const dp=document.getElementById('dia-phone');
  if(cp)cp.value='';
  if(hp){delete hp.dataset.edited; hp.value='';}
  if(ep)ep.value='';
  if(dp){dp.value='tue'; reorderPhone();}
}

function generatePreview(){
  document.getElementById('preview-grupo-title').textContent=`Grupo ${selectedGrupo} — Salidas de la semana`;
  const DIA_BADGE={
    tue:'<div class="dia-badge badge-mar">Martes</div>',
    thu:'<div class="dia-badge badge-jue">Jueves</div>',
    fri:'<div class="dia-badge badge-vie">Viernes</div>'
  };
  const c = document.getElementById('salidas-container');
  const rows = [];
  Array.from(c.children).forEach(card => {
    if(card.id === 'card-phone'){
      const diaKey = card.dataset.diaKey || 'tue';
      rows.push({
        enc: document.getElementById('enc-phone').value||'—',
        terr:'TELEFÓNICA', tel:true,
        badge: DIA_BADGE[diaKey],
        fecha: formatShortFull(card.dataset.fecha||WEEK.tue).replace(/\//g,'-'),
        cond: document.getElementById('cond-phone').value||'—',
        hora: (document.getElementById('hora-phone').value||'17:30').replace(':','.')
      });
    } else {
      const i = parseInt(card.dataset.idx);
      const n = selected[i];
      rows.push({
        enc: document.getElementById('enc-'+n).value||'—',
        terr: n, tel:false,
        badge: DIA_BADGE[DIA_CONFIG[i].key],
        fecha: formatShortFull(document.getElementById('fecha-'+n).value).replace(/\//g,'-'),
        cond: document.getElementById('cond-'+n).value||'—',
        hora: (document.getElementById('hora-'+n).value||'18:30').replace(':','.')
      });
    }
  });
  document.getElementById('preview-body').innerHTML=rows.map(r=>`
    <tr${r.tel?' class="tel-row"':''}>
      <td>${r.enc}</td>
      <td>${r.tel?'<div class="tel-terr">Telefónica</div>':`<div class="terr-num-big">${r.terr}</div>`}</td>
      <td>${r.badge}<div class="fecha-num">${r.fecha}</div></td>
      <td><div class="cond-txt">${r.cond}</div></td>
      <td><div class="hora-txt">${r.hora}</div></td>
    </tr>`).join('');
  hide('view-config');show('view-preview');setStep(3);
}
</script>
