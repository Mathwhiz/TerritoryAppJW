<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador — Ziv</title>
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1c1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ziv">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css?v=1.2">
</head>
<body>

<button class="btn-home" id="btn-home" onclick="goToCover()" title="Inicio">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<div class="app">

  <!-- ── COVER ── -->
  <div id="view-cover" class="view active">
    <div class="cover cs-module-cover">

      <div class="cs-module-icon-anim" style="--module-color:#D85A30;--module-color-dim:rgba(216,90,48,0.35);">
        <div class="cs-module-icon-wrap" style="background:rgba(216,90,48,0.15);">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="#D85A30" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="7" r="4" stroke="#D85A30" stroke-width="1.6"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="#D85A30" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="cs-module-title">Administrador</div>
      <div class="cs-module-sub js-congre" style="color:#D85A30;">—</div>
      <div class="cs-module-label">¿Qué querés hacer?</div>

      <button class="cs-module-card" style="--card-hover-border:rgba(216,90,48,0.55);--card-hover-bg:#2a1711;--card-hover-shadow:0 6px 24px rgba(0,0,0,0.35),0 0 0 1px rgba(216,90,48,0.55),0 4px 20px rgba(216,90,48,0.12);" onclick="goToPin()">
        <div class="cs-module-card-icon" style="background:rgba(216,90,48,0.15);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="#D85A30" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="9" cy="7" r="4" stroke="#D85A30" stroke-width="1.8"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="#D85A30" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-module-card-title">Lista de Hermanos</div>
          <div class="cs-module-card-sub">Gestionar publicadores y roles</div>
        </div>
      </button>

      <button class="cs-module-card" style="--card-hover-border:rgba(127,119,221,0.55);--card-hover-bg:#1a1830;--card-hover-shadow:0 6px 24px rgba(0,0,0,0.35),0 0 0 1px rgba(127,119,221,0.55),0 4px 20px rgba(127,119,221,0.12);" onclick="goToPinEspeciales()">
        <div class="cs-module-card-icon" style="background:rgba(127,119,221,0.15);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="4" width="18" height="18" rx="3" stroke="#7F77DD" stroke-width="1.8"/>
            <path d="M16 2v4M8 2v4M3 10h18" stroke="#7F77DD" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8 14h2M11 14h2M8 17h2M11 17h2M14 14h2M14 17h2" stroke="#7F77DD" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-module-card-title" style="color:#9b93ee;">Semanas especiales</div>
          <div class="cs-module-card-sub">Asambleas, conmemoración y más</div>
        </div>
      </button>

      <a href="../index.html" class="cs-back-btn">← Volver al módulo</a>

    </div>
  </div>

  <!-- ── PIN MODAL ── -->
  <div id="pin-modal-hermanos" class="pin-modal" style="display:none;" onclick="if(event.target===this)pinCancel()">
    <div class="pin-card">
      <div class="pin-title">Encargado</div>
      <div class="pin-sub">Ingresá el PIN</div>
      <div class="pin-dots">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-grid">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn" style="visibility:hidden;"></button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn pin-del" onclick="pinDelete()">⌫</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <button class="pin-cancel" onclick="pinCancel()">Cancelar</button>
    </div>
  </div>

  <!-- ── MAIN: LISTA ── -->
  <div id="view-main" class="view">
    <div class="main-header">
      <div>
        <div class="main-title">Hermanos</div>
        <div class="main-sub js-congre">—</div>
      </div>
      <button class="btn-nuevo" onclick="abrirNuevo()">+ Nuevo</button>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="#666" stroke-width="1.8"/><path d="m21 21-4.35-4.35" stroke="#666" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input type="text" id="h-search" placeholder="Buscar hermano…" oninput="filtrarLista()" autocomplete="off">
      </div>
    </div>

    <select id="h-rol" class="rol-filter" onchange="filtrarLista()">
      <option value="">— Todos los roles —</option>
      <option value="__sin_roles__">Sin asignación</option>
      <optgroup label="Asignaciones">
        <option value="LECTOR">Lector</option>
        <option value="SONIDO">Sonido</option>
        <option value="PLATAFORMA">Plataforma</option>
        <option value="MICROFONISTAS">Micrófonos</option>
        <option value="ACOMODADOR_AUDITORIO">Acod. Auditorio</option>
        <option value="ACOMODADOR_ENTRADA">Acod. Entrada</option>
        <option value="PRESIDENTE">Pres. Reunión</option>
        <option value="REVISTAS">Revistas</option>
        <option value="PUBLICACIONES">Publicaciones</option>
        <option value="CONDUCTOR_GRUPO_1">Conductor Grupo 1</option>
        <option value="CONDUCTOR_GRUPO_2">Conductor Grupo 2</option>
        <option value="CONDUCTOR_GRUPO_3">Conductor Grupo 3</option>
        <option value="CONDUCTOR_GRUPO_4">Conductor Grupo 4</option>
        <option value="CONDUCTOR_CONGREGACION">Conductor Congregación</option>
        <option value="SUPERINTENDENTE_CIRCUITO">Sup. de Circuito</option>
      </optgroup>
      <optgroup label="Vida y Ministerio">
        <option value="VM_PRESIDENTE">Presidente VM</option>
        <option value="VM_ORACION">Oración</option>
        <option value="VM_TESOROS">Discurso Tesoros</option>
        <option value="VM_JOYAS">Perlas escondidas</option>
        <option value="VM_LECTURA">Lectura Bíblica</option>
        <option value="VM_MINISTERIO_CONVERSACION">Min. Conversación</option>
        <option value="VM_MINISTERIO_REVISITA">Min. Revisita</option>
        <option value="VM_MINISTERIO_ESCENIFICACION">Min. Escenificación</option>
        <option value="VM_MINISTERIO_DISCURSO">Min. Discurso</option>
        <option value="VM_VIDA_CRISTIANA">Vida Cristiana</option>
        <option value="VM_ESTUDIO_CONDUCTOR">Conductor Estudio</option>
      </optgroup>
    </select>

    <div id="hermanos-list">
      <div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Cargando…</div></div>
    </div>

    <button id="btn-ver-planilla" class="btn-secondary" onclick="abrirPlanilla()" style="width:100%;margin-top:16px;display:none;">
      📊 Ver planilla
    </button>

    <div style="height:5rem;"></div>
  </div>

  <!-- ── SEMANAS ESPECIALES ── -->
  <div id="view-especiales" class="view">
    <div class="main-header">
      <div>
        <div class="main-title" style="color:#9b93ee;">Semanas especiales</div>
        <div class="main-sub js-congre">—</div>
      </div>
      <button class="btn-esp-add" onclick="toggleFormEspecial()" style="width:36px;height:36px;font-size:22px;">+</button>
    </div>

    <div id="especiales-lista"><div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Cargando…</div></div></div>

    <div id="especiales-form" style="display:none;background:#1e2023;border:1px solid #2e3033;border-radius:14px;padding:14px 16px;margin-top:12px;">
      <select id="esp-tipo" onchange="actualizarLabelFechaEsp()" class="esp-select">
        <option value="conmemoracion">Conmemoración</option>
        <option value="superintendente">Visita superintendente</option>
        <option value="asamblea">Asamblea</option>
      </select>
      <div class="esp-field">
        <label id="esp-fecha-label" class="esp-label">Fecha exacta del evento</label>
        <input type="date" id="esp-fecha" class="esp-date-input">
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn-secondary" onclick="toggleFormEspecial()" style="flex:1;">Cancelar</button>
        <button class="btn-save" onclick="guardarEspecial()" style="flex:2;">Guardar</button>
      </div>
    </div>

    <div style="height:2rem;"></div>
  </div>

  <!-- ── MODAL HERMANO ── -->
  <div id="modal-hermano" class="modal-overlay" style="display:none;" onclick="if(event.target===this)cerrarModal()">
    <div class="modal-card">
      <div class="modal-titulo" id="modal-titulo">Hermano</div>

      <label class="modal-campo-label">Nombre</label>
      <input type="text" id="modal-nombre" class="modal-nombre-input" placeholder="Ej: Flores Daniel"
        onkeydown="if(event.key==='Enter')guardarHermano()">

      <!-- Roles Asignaciones -->
      <div style="margin-bottom:8px;">
        <span class="roles-section-titulo roles-titulo-asign">Asignaciones</span>
      </div>
      <div class="roles-grid" style="margin-bottom:18px;">
        <label class="rol-checkbox"><input type="checkbox" id="hcb-LECTOR"><span>Lector</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-SONIDO"><span>Sonido</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-PLATAFORMA"><span>Plataforma</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-MICROFONISTAS"><span>Micrófonos</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-ACOMODADOR_AUDITORIO"><span>Acod. Auditorio</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-ACOMODADOR_ENTRADA"><span>Acod. Entrada</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-PRESIDENTE"><span>Pres. Reunión</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-REVISTAS"><span>Revistas</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-PUBLICACIONES"><span>Publicaciones</span></label>
        <label class="rol-checkbox span2" style="grid-column:span 1"><input type="checkbox" id="hcb-CONDUCTOR_GRUPO_1"><span>Conductor Grupo 1</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-CONDUCTOR_GRUPO_2"><span>Conductor Grupo 2</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-CONDUCTOR_GRUPO_3"><span>Conductor Grupo 3</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-CONDUCTOR_GRUPO_4"><span>Conductor Grupo 4</span></label>
        <label class="rol-checkbox" style="grid-column:span 2"><input type="checkbox" id="hcb-CONDUCTOR_CONGREGACION"><span>Conductor Congregación</span></label>
        <label class="rol-checkbox" style="grid-column:span 2"><input type="checkbox" id="hcb-SUPERINTENDENTE_CIRCUITO"><span>Sup. de Circuito</span></label>
      </div>

      <!-- Roles VM -->
      <div style="margin-bottom:8px;">
        <span class="roles-section-titulo roles-titulo-vm">Vida y Ministerio</span>
      </div>
      <div class="roles-grid" style="margin-bottom:8px;">
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_PRESIDENTE"><span>Presidente</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_ORACION"><span>Oración</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_TESOROS"><span>Disc. Tesoros</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_JOYAS"><span>Perlas escondidas</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_LECTURA"><span>Lectura Bíblica</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_MINISTERIO_CONVERSACION"><span>Min. Conversación</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_MINISTERIO_REVISITA"><span>Min. Revisita</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_MINISTERIO_ESCENIFICACION"><span>Min. Escenificación</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_MINISTERIO_DISCURSO"><span>Min. Discurso</span></label>
        <label class="rol-checkbox"><input type="checkbox" id="hcb-VM_VIDA_CRISTIANA"><span>Vida Cristiana</span></label>
        <label class="rol-checkbox" style="grid-column:span 2"><input type="checkbox" id="hcb-VM_ESTUDIO_CONDUCTOR"><span>Conductor Estudio</span></label>
      </div>

      <div class="modal-status" id="modal-status"></div>
      <div class="modal-btns">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarHermano()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- ── CHAT FAB ── -->
  <button id="chat-fab" class="chat-fab" onclick="openChatPanel()" style="display:none;" title="Notas compartidas">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div id="chat-overlay" class="chat-overlay" style="display:none;" onclick="if(event.target===this)closeChatPanel()">
    <div class="chat-panel">
      <div class="chat-panel-body">
        <div class="chat-panel-head">
          <span id="chat-panel-titulo" class="chat-panel-title">Notas — Congregación</span>
          <button class="chat-close-btn" onclick="closeChatPanel()">✕</button>
        </div>
        <div id="chat-loading" style="display:none;text-align:center;padding:2rem;color:#555;font-size:13px;">Cargando…</div>
        <div id="chat-error"  style="display:none;"></div>
        <div id="chat-empty"  style="display:none;text-align:center;padding:2rem;color:#555;font-size:13px;">Sin notas todavía.</div>
        <div id="chat-list"   class="chat-list" style="display:none;"></div>
        <div class="chat-composer">
          <textarea id="chat-mensaje" class="chat-textarea" placeholder="Escribí una nota…" rows="2"></textarea>
          <button class="chat-send-btn" onclick="sendChatNota(this)">Publicar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="chat-edit-modal" class="chat-edit-modal" style="display:none;" onclick="if(event.target===this)closeChatEdit()">
    <div class="chat-edit-card">
      <div style="font-size:14px;font-weight:600;color:#ccc;margin-bottom:10px;">Editar nota</div>
      <textarea id="chat-edit-texto" class="chat-textarea" rows="4"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn-secondary" onclick="closeChatEdit()" style="flex:1;padding:9px;">Cancelar</button>
        <button class="btn-primary" onclick="confirmarEditNota()" style="flex:2;padding:9px;">Guardar</button>
      </div>
    </div>
  </div>

</div><!-- /.app -->

<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');</script>
<script src="../ui-utils.js?v=1.4"></script>
<script type="module" src="app.js?v=1.1"></script>
</body>
</html>
