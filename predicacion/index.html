<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predicación — Ziv</title>
  <link rel="icon" type="image/png" href="/assets/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1c1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ziv">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="../shared/styles-base.css">
  <link rel="stylesheet" href="styles.css?v=1.0">
</head>
<body>

<!-- ── view-noauth: usuario anónimo o sin sesión ── -->
<div id="view-noauth" class="view">
  <div class="noauth-wrap">
    <div class="noauth-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="#E05277" stroke-width="1.6"/>
        <path d="M4 20c0-3.5 3.6-6 8-6s8 2.5 8 6" stroke="#E05277" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M16.5 12.5l2 2 3.5-3.5" stroke="#E05277" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="noauth-title">Registro requerido</div>
    <div class="noauth-msg">
      Este módulo solo está disponible para usuarios registrados.<br>
      El acceso como invitado no está disponible.
    </div>
    <button class="pred-btn pred-btn-primary" style="width:100%;max-width:260px;"
      onclick="window.signInWithGoogle && window.signInWithGoogle()">
      Iniciar sesión con Google
    </button>
    <a href="../index.html#menu" class="cs-back-btn">← Volver al módulo</a>
  </div>
</div>

<!-- ── view-app: app principal ── -->
<div id="view-app" class="view">

  <div class="pred-header">
    <a href="../index.html#menu" class="pred-back-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <span class="pred-header-title">Predicación</span>
  </div>

  <div class="pred-body">

    <!-- Cronómetro -->
    <div class="pred-card">
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="timer-btns">
        <button class="pred-btn pred-btn-primary" id="timer-toggle-btn" onclick="timerToggle()">Iniciar</button>
        <button class="pred-btn pred-btn-ghost" onclick="timerReset()">Reiniciar</button>
      </div>
      <div id="timer-add-wrap" class="timer-add-wrap" style="display:none;">
        <button class="timer-add-btn" id="timer-add-btn" onclick="timerAgregarAlMes()">+ Agregar al mes</button>
      </div>
    </div>

    <!-- Mes actual -->
    <div class="pred-card">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="navMes(-1)" title="Mes anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="month-nav-label" id="month-label">—</span>
        <button class="month-nav-btn" id="month-next-btn" onclick="navMes(1)" title="Mes siguiente">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="stat-row">
        <span class="stat-label-text">Tiempo</span>
        <div class="tiempo-row">
          <span class="stat-value-text" id="stat-tiempo">0 min</span>
          <button class="tiempo-edit-btn" onclick="abrirEditTiempo()">Editar</button>
        </div>
      </div>

      <div class="stat-row">
        <span class="stat-label-text">Revisitas</span>
        <div class="stat-counter-wrap">
          <button class="counter-btn" onclick="cambiarContador('revisitas', -1)">−</button>
          <span class="counter-val" id="stat-revisitas">0</span>
          <button class="counter-btn" onclick="cambiarContador('revisitas', 1)">+</button>
        </div>
      </div>

      <div class="stat-row">
        <span class="stat-label-text">Estudios</span>
        <div class="stat-counter-wrap">
          <button class="counter-btn" onclick="cambiarContador('estudios', -1)">−</button>
          <span class="counter-val" id="stat-estudios">0</span>
          <button class="counter-btn" onclick="cambiarContador('estudios', 1)">+</button>
        </div>
      </div>
    </div>

    <!-- Historial -->
    <div class="hist-section-title">Historial</div>
    <div id="hist-container">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>

  </div><!-- /pred-body -->

  <!-- Modal: editar tiempo -->
  <div id="edit-tiempo-modal" class="modal-overlay" style="display:none;"
       onclick="if(event.target===this) cerrarEditTiempo()">
    <div class="modal-card">
      <div class="modal-title">Editar tiempo</div>
      <div class="edit-time-wrap">
        <div class="edit-time-field">
          <label>Horas</label>
          <input class="edit-time-input" type="number" id="edit-horas" min="0" max="99" placeholder="0">
        </div>
        <span class="edit-time-sep">:</span>
        <div class="edit-time-field">
          <label>Minutos</label>
          <input class="edit-time-input" type="number" id="edit-mins" min="0" max="59" placeholder="0">
        </div>
      </div>
      <div class="modal-actions">
        <button class="pred-btn pred-btn-ghost" onclick="cerrarEditTiempo()">Cancelar</button>
        <button class="pred-btn pred-btn-primary" onclick="guardarEditTiempo()">Guardar</button>
      </div>
    </div>
  </div>

</div><!-- /view-app -->

<script src="../shared/ui-utils.js?v=1.4"></script>
<script type="module" src="app.js"></script>
</body>
</html>
